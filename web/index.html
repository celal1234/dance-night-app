<!DOCTYPE html><html><head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="United Istanbul">

  <!-- Open Graph / WhatsApp link preview -->
  <meta property="og:title" content="United Istanbul">
  <meta property="og:description" content="Rezervasyon Formu">
  <meta property="og:image" content="https://unitedistanbul.danceschoolapp.com/icons/Icon-512.png">
  <meta property="og:url" content="https://unitedistanbul.danceschoolapp.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://unitedistanbul.danceschoolapp.com/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="United Istanbul">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>United Istanbul</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background-color: #121212;
      height: 100%;
      width: 100%;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1E1E1E 0%, #121212 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      color: #ffffff;
      font-family: sans-serif;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 24px;
    }

    .loading-subtitle {
      color: #D4AF37;
      font-family: sans-serif;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 3px;
      margin-top: 4px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: #D4AF37;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-top: 40px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #ffffff;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  
  

  <div id="loading-screen">
    <div class="loading-title">United</div>
    <div class="loading-subtitle">ISTANBUL</div>
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async=""></script>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(function () { screen.remove(); }, 400);
      }
    });
  </script>



</body></html>
